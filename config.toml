# 全局配置文件
# 即梦AI视频批量生成工具配置

[default]
# 默认提示词，用于生成视频的描述
prompt = "你现在是世界顶级的商业广告导演及视觉传达专家。你的任务是根据我提供的【产品信息】（可能是文字描述，也可能是上传的产品图片），构思并策划一支视频广告，设计一个引人入胜的视觉叙事逻辑。重点要基于产品卖点、风格及视觉特征; 同时确保光影（Lighting）、色调（Color Palette）和氛围（Mood）统一。也要善于运用特写/推镜头/低角度等镜头语言。请注意：一定要确保产品在画面中的状态，确保与原产品一致，不要改变产品形状特征。"
# 默认生成帧数 (121=5秒, 241=10秒)
frames = 121

[output]
# 图片目录，相对于当前目录的路径
image_dir = "products"

[api]
# 720P视频生成
req_key_720p = "jimeng_i2v_first_v30"
# 1080P视频生成
req_key_1080p = "jimeng_i2v_first_v30_1080"
# 视频质量: 720p 或 1080p
quality = "720p"
