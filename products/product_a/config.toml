# 产品A配置文件
# 如果没有配置项，则使用全局配置

[product]
# 产品描述信息
description = "这是茅台酒，产自中国贵州省茅台镇，传承千年酿造工艺，甄选本地优质糯高粱、小麦与赤水河水，历经一年生产周期、两次投料、九次蒸煮、八次发酵、七次取酒，五年以上陶坛窖藏，方得一瓶正宗茅台。酒体微黄透明，酱香突出，幽雅细腻，酒体醇厚，回味悠长，空杯留香持久。53%vol 经典度数，成就酱香型白酒的典范之作。"
# 图片目录（相对于产品目录）
image_dir = "images"

[default]
# 产品特定的提示词（可选）
prompt = "产品A特色展示动画"
